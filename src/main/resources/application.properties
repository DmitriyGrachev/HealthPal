# ?????????? ??????? dev, ????? Spring ???????? ??????? ?? ?????? ??
spring.profiles.active=dev

# ??????? ?????????
spring.application.name=FitnessApp

# ????????? ???? ?????? (????????? ?????????, ?????? ???????)
spring.datasource.url=jdbc:postgresql://localhost:5432/fitness_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

#Hibernate
#Flyway will keep schema and validate with hibernate anotations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.generate_statistics: true

#Flyway
spring.flyway.enabled=true
#If not epty create history migration
#spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#For N+1 issue with jpa
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true



# FatSecret API (????????? ?????? ????????? ?????????)
fatsecret.redirect-uri=http://localhost:8080/callback
fatsecret.auth-url=https://oauth.fatsecret.com/connect/authorize
fatsecret.token-url=https://oauth.fatsecret.com/connect/token
fatsecret.api-url=https://platform.fatsecret.com/rest/server.api
fatsecret.callback-url=http://localhost:8080/api/v1/nutrition/callback


# ???????????
spring.cache.cache-names=StudentCache, CourseCache
spring.cache.caffeine.spec=initialCapacity=50,maximumSize=10,expireAfterAccess=300s